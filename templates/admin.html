<!DOCTYPE html>
<html>

<head>
    <title>Admin Panel</title>
    <style>
        body {
            font-family: Arial;
            padding: 40px;
            background: #f4f4f4;
        }

        h1 {
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th,
        td {
            padding: 12px;
            border: 1px solid #ddd;
            text-align: left;
        }

        th {
            background: #333;
            color: white;
        }

        tr:hover {
            background: #f1f1f1;
        }
    </style>
</head>

<body>

    <div style="margin-bottom: 20px;">
        <a href="/add-product">Add Product</a> |
        <a href="/products">View Products</a> |
        <a href="/logout">Logout</a>
    </div>

    <h1>📊 Contact Form Submissions</h1>

    <table>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Message</th>
            <th>Action</th>
        </tr>

        {% for c in contacts %}
        <tr>
            <td>{{ c[0] }}</td>
            <td>{{ c[1] }}</td>
            <td>{{ c[2] }}</td>
            <td>{{ c[3] }}</td>
            <td>{{ c[4] }}</td>
            <td>
                <a href="/delete/{{ c[0] }}" onclick="return confirm('Delete this record?')">
                    Delete
                </a>
            </td>
        </tr>
        {% endfor %}
    </table>

</body>

</html>
